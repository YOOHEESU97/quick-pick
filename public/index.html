<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Pick</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #f5c518;
      --success: #3dd68c;
      --error: #ff6b6b;
      --warn: #ffb347;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }
    header { margin-bottom: 28px; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    h1 .accent { color: var(--accent); }
    .sub { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }
    .tabs {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .tab {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.active {
      border-color: var(--accent);
      color: var(--text);
      background: #243044;
    }
    .tab.active.pension {
      border-color: #7eb8ff;
    }
    .pension-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 1rem;
    }
    .pension-jo {
      color: var(--accent);
      min-width: 2.5em;
    }
    .pension-digits {
      letter-spacing: 0.12em;
      font-variant-numeric: tabular-nums;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    @media (min-width: 480px) { .stats { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 640px) { .stats { grid-template-columns: repeat(4, 1fr); } }
    .stat.profit strong { color: var(--success); }
    .stat.loss strong { color: var(--error); }
    .prize-line { font-size: 0.8rem; color: var(--success); margin-top: 6px; }
    .pending { color: var(--warn); font-size: 0.75rem; }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .stat label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .stat strong { display: block; font-size: 1.1rem; margin-top: 4px; }
    section { margin-bottom: 28px; }
    section h2 {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .round-group {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .round-group:last-child { border-bottom: none; }
    .round-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .round-title { font-weight: 700; font-size: 1.05rem; }
    .round-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .round-summary {
      font-size: 0.85rem;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .game-row {
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
    }
    .game-row:last-child { border-bottom: none; padding-bottom: 0; }
    .game-row-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .round { font-weight: 700; font-size: 1rem; }
    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: #2a3548;
      color: var(--muted);
    }
    .badge.ai { background: #1e3a5f; color: #7eb8ff; }
    .balls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; align-items: center; }
    /* 동행복권 구간별 공 색 (1~10 노랑, 11~20 파랑, 21~30 빨강, 31~40 회색, 41~45 초록) */
    .ball {
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 4px rgba(0,0,0,.35), inset 0 2px 4px rgba(255,255,255,.35);
      border: 1px solid rgba(0,0,0,.12);
    }
    .ball.zone-1 { background: radial-gradient(circle at 32% 28%, #fff7a8 0%, #f5c400 45%, #e5a800 100%); color: #3d3200; }
    .ball.zone-2 { background: radial-gradient(circle at 32% 28%, #b8e8ff 0%, #5eb0f0 45%, #3d8fd4 100%); color: #0a2a4a; }
    .ball.zone-3 { background: radial-gradient(circle at 32% 28%, #ffb0b0 0%, #f06a6a 45%, #d94848 100%); color: #fff; }
    .ball.zone-4 { background: radial-gradient(circle at 32% 28%, #e0e0e0 0%, #a8a8a8 45%, #8a8a8a 100%); color: #fff; }
    .ball.zone-5 { background: radial-gradient(circle at 32% 28%, #d4f080 0%, #9fd04a 45%, #7ab82e 100%); color: #1e3a08; }
    .ball.bonus {
      background: radial-gradient(circle at 32% 28%, #d4c4ff 0%, #8b6cf0 45%, #6b4fcf 100%);
      color: #fff;
      box-shadow: 0 2px 4px rgba(0,0,0,.4), inset 0 2px 4px rgba(255,255,255,.25);
    }
    .ball-plus { color: var(--muted); font-weight: 700; font-size: 0.9rem; padding: 0 2px; }
    .game-label { font-size: 0.75rem; color: var(--muted); margin-top: 10px; }
    .meta { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }
    .log {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      display: flex;
      gap: 10px;
    }
    .log:last-child { border-bottom: none; }
    .log time { color: var(--muted); font-size: 0.75rem; white-space: nowrap; flex-shrink: 0; }
    .log .msg { flex: 1; word-break: break-word; }
    .log.info .dot { color: var(--muted); }
    .log.success .dot { color: var(--success); }
    .log.warn .dot { color: var(--warn); }
    .log.error .dot { color: var(--error); }
    .dot::before { content: '● '; }
    footer { text-align: center; color: var(--muted); font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="pageTitle"><span class="accent">로</span>또</h1>
      <p class="sub">구매 기록 · 당첨 · 실행 로그</p>
      <div class="tabs">
        <button type="button" class="tab active" id="tab-lotto" data-product="lotto">로또 6/45</button>
        <button type="button" class="tab" id="tab-pension" data-product="pension">연금복권720+</button>
      </div>
    </header>

    <div class="stats" id="stats"></div>

    <section>
      <h2>구매 내역</h2>
      <div class="card" id="purchases"></div>
    </section>

    <section>
      <h2>실행 로그</h2>
      <div class="card" id="logs"></div>
    </section>

    <footer style="margin-top:24px">화면 30초 갱신(로그인 없음) · 예치금은 buy 시만</footer>
  </div>

  <script>
    let currentProduct = 'lotto';

    document.getElementById('tab-lotto').addEventListener('click', () => switchTab('lotto'));
    document.getElementById('tab-pension').addEventListener('click', () => switchTab('pension'));

    function switchTab(product) {
      currentProduct = product;
      document.getElementById('tab-lotto').classList.toggle('active', product === 'lotto');
      document.getElementById('tab-pension').classList.toggle('active', product === 'pension');
      document.getElementById('pageTitle').innerHTML = product === 'pension'
        ? '<span class="accent">연</span>금복권720+'
        : '<span class="accent">로</span>또';
      load();
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    /** 동행복권 구간별 색상 클래스 */
    function lottoBallClass(n, isBonus = false) {
      if (isBonus) return 'ball bonus';
      if (n <= 10) return 'ball zone-1';
      if (n <= 20) return 'ball zone-2';
      if (n <= 30) return 'ball zone-3';
      if (n <= 40) return 'ball zone-4';
      return 'ball zone-5';
    }

    function renderBalls(nums, options = {}) {
      const { bonus } = options;
      const main = nums.map(n =>
        `<span class="${lottoBallClass(n)}">${String(n).padStart(2, '0')}</span>`
      );
      if (bonus != null && bonus > 0) {
        main.push(`<span class="ball-plus">+</span>`);
        main.push(`<span class="${lottoBallClass(bonus, true)}">${String(bonus).padStart(2, '0')}</span>`);
      }
      return main.join('');
    }

    function fmtWon(n) {
      return (n ?? 0).toLocaleString() + '원';
    }

    function renderPensionTicket(ticket) {
      const digits = String(ticket.digits ?? '').padStart(6, '0');
      return `<span class="pension-group"><span class="pension-jo">${ticket.group}조</span><span class="pension-digits">${digits}</span></span>`;
    }

    /** 같은 회차 구매를 한 카드로 묶음 */
    function groupByRound(entries, product) {
      const map = new Map();
      for (const p of entries) {
        if (!map.has(p.round)) {
          map.set(p.round, {
            round: p.round,
            purchases: [],
            games: [],
            totalAmount: 0,
            totalPrize: 0,
            allSettled: true,
            methods: new Set(),
            latestAt: p.createdAt,
          });
        }
        const g = map.get(p.round);
        g.purchases.push(p);
        g.totalAmount += p.amount ?? 0;
        g.methods.add(p.method);
        if (new Date(p.createdAt) > new Date(g.latestAt)) g.latestAt = p.createdAt;
        if (p.settledAt && p.prizeTotal != null) {
          g.totalPrize += p.prizeTotal;
        } else {
          g.allSettled = false;
        }

        if (product === 'pension') {
          (p.pensionTickets ?? []).forEach((ticket, i) => {
            g.games.push({
              label: String.fromCharCode(65 + g.games.length),
              pensionTicket: ticket,
              settlement: p.pensionSettlements?.[i] ?? null,
            });
          });
        } else {
          (p.tickets ?? []).forEach((ticket, i) => {
            g.games.push({
              label: String.fromCharCode(65 + g.games.length),
              ticket,
              settlement: p.settlements?.[i] ?? null,
            });
          });
        }
      }
      return [...map.values()].sort((a, b) => b.round - a.round);
    }

    function renderRoundGroup(g, product) {
      const unit = product === 'pension' ? '매' : '게임';
      const methodLabel = [...g.methods].map(m => m === 'ai' ? 'AI' : '통계').join(' · ');
      const prizeText = g.allSettled
        ? (g.totalPrize > 0 ? `당첨 합계 ${g.totalPrize.toLocaleString()}원` : '전체 낙첨')
        : '추첨 대기';
      const prizeClass = g.allSettled ? (g.totalPrize > 0 ? 'prize-line' : 'meta') : 'pending';

      const gamesHtml = g.games.map(({ label, ticket, pensionTicket, settlement }) => {
        let gamePrize = '';
        if (settlement) {
          gamePrize = settlement.rank > 0
            ? `${settlement.rank}등 ${settlement.prize.toLocaleString()}원`
            : '낙첨';
        }
        const body = product === 'pension'
          ? renderPensionTicket(pensionTicket)
          : `<div class="balls">${renderBalls(ticket)}</div>`;
        return `
          <div class="game-row">
            <div class="game-row-head">
              <span class="game-label">${label}${unit}</span>
              ${gamePrize ? `<span class="${settlement.rank > 0 ? 'prize-line' : 'meta'}" style="margin:0">${gamePrize}</span>` : ''}
            </div>
            ${body}
          </div>`;
      }).join('');

      return `
        <div class="round-group">
          <div class="round-head">
            <span class="round-title">${g.round}회차</span>
            <div class="round-badges">
              <span class="badge">${g.games.length}${unit}</span>
              <span class="badge ${g.methods.has('ai') ? 'ai' : ''}">${methodLabel}</span>
            </div>
          </div>
          ${gamesHtml}
          <div class="round-summary ${prizeClass}">${prizeText} · 구매 ${g.totalAmount.toLocaleString()}원</div>
          <div class="meta">${fmtTime(g.latestAt)} · ${g.purchases.length}건 구매</div>
        </div>`;
    }

    async function load() {
      const q = `product=${currentProduct}`;
      const [status, purchases, logs] = await Promise.all([
        fetch(`/api/status?${q}`).then(r => r.json()),
        fetch(`/api/purchases?limit=50&${q}`).then(r => r.json()),
        fetch('/api/logs?limit=60').then(r => r.json()),
      ]);

      const f = status.financial ?? {};
      const net = f.netProfit ?? 0;
      const netClass = net >= 0 ? 'profit' : 'loss';

      const balanceText = status.balance
        ? fmtWon(status.balance.available)
        : (status.balanceHint ?? '-');
      const balanceTitle = status.balance?.updatedAt
        ? `구매 시 갱신 · ${fmtTime(status.balance.updatedAt)}`
        : (status.balanceHint ?? '');

      document.getElementById('stats').innerHTML = `
        <div class="stat"><label>예치금 잔액</label><strong title="${balanceTitle}">${balanceText}</strong></div>
        <div class="stat ${netClass}"><label>순손익</label><strong>${fmtWon(net)}</strong></div>
        <div class="stat"><label>총 당첨</label><strong>${fmtWon(f.totalWon)}</strong></div>
        <div class="stat"><label>총 구매</label><strong>${fmtWon(f.totalSpent)}</strong></div>
        <div class="stat"><label>진행 회차</label><strong>${status.saleRound ?? '-'}회</strong></div>
        <div class="stat"><label>구매</label><strong>${status.purchaseCount ?? 0}회</strong>${f.pendingCount ? `<span class="pending"> · 대기 ${f.pendingCount}</span>` : ''}</div>
        <div class="stat"><label>자동 구매</label><strong style="font-size:0.85rem">${status.scheduleLabel ?? '-'}</strong></div>
      `;

      const pEl = document.getElementById('purchases');
      const grouped = groupByRound(purchases.entries, currentProduct);
      const buyCmd = currentProduct === 'pension' ? 'npm run pension-buy' : 'npm run buy';
      if (!grouped.length) {
        pEl.innerHTML = `<div class="empty">아직 구매 기록이 없습니다.<br>${buyCmd} 실행 후 표시됩니다.</div>`;
      } else {
        pEl.innerHTML = grouped.map(g => renderRoundGroup(g, currentProduct)).join('');
      }

      const lEl = document.getElementById('logs');
      if (!logs.entries.length) {
        lEl.innerHTML = '<div class="empty">로그가 없습니다.</div>';
      } else {
        lEl.innerHTML = logs.entries.map(l => `
          <div class="log ${l.level}">
            <time>${fmtTime(l.createdAt)}</time>
            <span class="msg dot">${l.message}</span>
          </div>
        `).join('');
      }
    }

    load();
    setInterval(() => load(), 30000);
  </script>
</body>
</html>
